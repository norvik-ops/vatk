server {
    listen 80;
    server_name _;

    # Security headers (relaxed for dev HMR + Vite)
    add_header X-Frame-Options              "DENY"                              always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header X-XSS-Protection            "0"                                 always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    # unsafe-inline + unsafe-eval needed for Vite HMR; ws: allows WebSocket hot-reload.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'none';"
        always;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
