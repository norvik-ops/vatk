version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - forbidigo
    # Hinweis: misspell ist deaktiviert — dieses Repo enthält viele deutsche
    # User-facing-Strings (Konfiguration, Identifikation, Koordination …),
    # die der englische Wordlist-Linter fälschlich als Tippfehler markiert.

  settings:
    errcheck:
      # check-type-assertions: false (default) — Cast-Panics fängt der
      # globale Recovery-Middleware ab; jeden c.Get(...).(string)-Cast mit
      # comma-ok zu schreiben würde nur Noise erzeugen.
      check-type-assertions: false
      exclude-functions:
        # Print-/Log-Helpers — Fehler hier sind belanglos
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Sscanf

    forbidigo:
      # S14-7 + ADR-0018:
      # - `interface{}` ist verboten; Go 1.18+ Code nutzt `any`. Der bestehende
      #   sqlc-/pgx-generierte Code in internal/db/ darf weiter `interface{}`
      #   verwenden (Library-imposed); die Exclusions-Regel filtert ihn unten raus.
      # - rohes `go func()` ohne safego.Run ist verboten — Pflicht-Pattern aus
      #   ADR-0018. Goroutinen werden über internal/shared/safego.Run gestartet,
      #   damit Panic-Eskalation + Parent-Context-Propagation enforced sind.
      # - S45-4 + ADR-0018: context.Background() ist in internal/** verboten.
      #   Alle Goroutinen und Service-Calls müssen den Request-/Job-Context
      #   propagieren. Ausnahmen: cmd/* (Startup-Owner), safego-Paket selbst,
      #   sqlc-generierter Code, und _test.go Dateien.
      forbid:
        - pattern: '\binterface\{\}'
          msg: "use `any` (Go 1.18+) instead of `interface{}`"
        - pattern: '^\s*go\s+func\s*\('
          msg: "raw `go func()` is forbidden — use safego.Run(ctx, name, fn) per ADR-0018"
        - pattern: 'strings\.Contains\(.*\.Error\(\)'
          msg: "use errors.Is/errors.As with sentinel errors instead of string matching on err.Error()"
        - pattern: 'context\.Background\(\)'
          msg: "context.Background() is forbidden in internal/ — propagate the request or job context (ADR-0018); annotate intentional startup uses with // TODO: ADR-0018 — startup context, intentional"
      analyze-types: false

    staticcheck:
      checks:
        - "all"
        # ST1000: package-Kommentar — pragmatisch nicht erzwungen
        - "-ST1000"
        # ST1020/ST1021: erzwungenes Kommentar-Format auf Public APIs —
        # in einem deutschsprachigen Codebase mit gemischten Kommentaren nervig
        - "-ST1020"
        - "-ST1021"
        # ST1003: Naming-Konventionen (RedisUrl → RedisURL) — bestehende
        # öffentliche Struct-Felder umzubenennen wäre ein Breaking Change
        - "-ST1003"
        # ST1005: Kapitalisierte Error-Strings — unkritisch
        - "-ST1005"

  exclusions:
    rules:
      # errcheck auf alle Test-Dateien deaktivieren
      - linters:
          - errcheck
        path: "_test\\.go"
      # Idiomatische `defer X.Close()` / `defer X.Rollback()` —
      # Close-Fehler sind in defer-Position selten handhabbar
      - linters:
          - errcheck
        source: "^\\s*defer\\s+"
      # demoseed: Best-Effort-Inserts — Scan/Exec-Fehler sind erwartet
      # (Demo-Daten dürfen bereits existieren) und werden absichtlich verworfen
      - linters:
          - errcheck
        path: "internal/shared/demoseed/"
      # forbidigo: sqlc-/pgx-generierte Code-Pfade dürfen `interface{}` weiter
      # verwenden (Library-imposed: Exec/Query/QueryRow Variadic, Scan-Signatur,
      # generierte Models). Hand-Code muss `any` nutzen.
      - linters:
          - forbidigo
        path: "internal/db/"
      # forbidigo: das safego-Paket selbst nutzt rohes `go runOnce(...)` als
      # Implementierung des Helpers — Bootstrapping-Ausnahme.
      - linters:
          - forbidigo
        path: "internal/shared/safego/"
      # forbidigo: Tests dürfen `go func()` für Test-Setup nutzen (keine
      # Production-Pflicht).
      - linters:
          - forbidigo
        path: "_test\\.go"
      # forbidigo: cmd/* Startup-Wiring darf rohe Goroutinen und
      # context.Background() verwenden (Server-Lifecycle-Owner, kein
      # Parent-Context vorhanden).
      - linters:
          - forbidigo
        path: "^cmd/"

formatters:
  enable:
    - gofmt
