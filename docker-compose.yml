services:
  frontend:
    image: ghcr.io/matharnica/vakt-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    # This service exits after building static assets into the shared volume.

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # 443 wird durch einen vorgelagerten Reverse-Proxy (z.B. Caddy) terminiert.
      # Für HTTPS: siehe docs/setup.md Abschnitt "TLS mit Caddy".
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  migrate:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/migrate"]
    user: "65532:65532"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "65532:65532"
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  worker:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/worker"]
    user: "65532:65532"
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vakt
      POSTGRES_USER: vakt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run install.sh or set the variable}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vakt"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # Nur mit: docker compose --profile ai up
  ollama:
    profiles: ["ai"]
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
    # Pull the default model once after first start:
    #   docker compose --profile ai exec ollama ollama pull llama3.2:3b
    # To disable AI: set VAKT_AI_PROVIDER=disabled in .env

  # Watchtower — automatic container updates (opt-in).
  # Uncomment to enable automatic nightly pulls of new Vakt images.
  # WARNING: Only enable on non-critical instances or if you've tested the update path.
  # See docs/configuration.md for update strategy guidance.
  #
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --schedule "0 0 3 * * *" --cleanup api worker
  #   restart: unless-stopped
  #   environment:
  #     WATCHTOWER_NOTIFICATIONS: shoutrrr
  #     # WATCHTOWER_NOTIFICATION_URL: slack://token@channel  # optional Slack alerts

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  ollama_models:
