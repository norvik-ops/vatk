services:
  frontend:
    image: ghcr.io/matharnica/vakt-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    # This service exits after building static assets into the shared volume.

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # 443 wird durch einen vorgelagerten Reverse-Proxy (z.B. Caddy) terminiert.
      # Für HTTPS: siehe docs/setup.md Abschnitt "TLS mit Caddy".
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      frontend:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  migrate:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/migrate"]
    user: "65532:65532"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "65532:65532"
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  worker:
    image: ghcr.io/matharnica/vakt-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/worker"]
    user: "65532:65532"
    env_file: .env
    environment:
      VAKT_DB_URL: "postgres://vakt:${POSTGRES_PASSWORD:?}@pgbouncer:5432/vakt?sslmode=disable"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vakt
      POSTGRES_USER: vakt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set — run install.sh or set the variable}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vakt"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1
    environment:
      DB_USER: vakt
      DB_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vakt
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      # pgx sends extra_float_digits on connect — pgBouncer must ignore it
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits"
      SERVER_RESET_QUERY: "DISCARD ALL"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 32m
          cpus: '0.1'

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # Redis-Auth: requirepass schützt vor unauthentifiziertem Zugriff aus dem Docker-Netzwerk.
    # REDIS_PASSWORD muss in .env gesetzt sein (siehe .env.example).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'

  # AI Copilot via lokales LLM — seit v0.6.x default-on (Community-Feature).
  # Default-Modell qwen2.5:3b wird beim ersten Start automatisch von ollama-init
  # gezogen (~1.9 GB Disk; läuft nur einmal, danach idle).
  # Zum Deaktivieren: VAKT_AI_PROVIDER=disabled in .env setzen.
  # Auf 4-GB-Gesamt-RAM-VMs ebenfalls deaktivieren — der 4g-Limit unten
  # würde sonst die anderen Container ausquetschen.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'

  # Pre-pull des Default-Modells beim ersten Start. Läuft genau einmal pro
  # Volume — wenn das Modell schon da ist, ist `ollama pull` ein No-Op.
  # Restart=no damit der Container nach erfolgreichem Pull beendet bleibt.
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo 'Pre-pulling default model ${VAKT_AI_MODEL:-qwen2.5:3b} (one-time)...';
        OLLAMA_HOST=http://ollama:11434 ollama pull ${VAKT_AI_MODEL:-qwen2.5:3b};
        echo 'Model ready.'
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # Watchtower — automatic container updates (opt-in).
  # Uncomment to enable automatic nightly pulls of new Vakt images.
  # WARNING: Only enable on non-critical instances or if you've tested the update path.
  # See docs/configuration.md for update strategy guidance.
  #
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --schedule "0 0 3 * * *" --cleanup api worker
  #   restart: unless-stopped
  #   environment:
  #     WATCHTOWER_NOTIFICATIONS: shoutrrr
  #     # WATCHTOWER_NOTIFICATION_URL: slack://token@channel  # optional Slack alerts

volumes:
  postgres_data:
  redis_data:
  frontend_dist:
  ollama_models:
