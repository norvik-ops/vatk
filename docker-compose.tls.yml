# TLS overlay for local development.
# Run AFTER generating certs:  ./scripts/gen-local-cert.sh
# Start:  docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
# Stop:   docker compose -f docker-compose.yml -f docker-compose.tls.yml down -v

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
