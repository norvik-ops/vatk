# SecHealth secrets injection for GitLab CI
# Usage: add the following to your .gitlab-ci.yml
#
#   include:
#     - remote: 'https://your-sechealth/ci/gitlab-template.yml'
#
# Required CI/CD variables:
#   VAKT_URL   — base URL of your SecHealth instance (no trailing slash)
#   VAKT_TOKEN — API token (sk_so_...)
#   VAKT_PROJECT — project ID or slug
#
# Optional:
#   VAKT_ENV   — environment name (default: prod)

.sechealth-secrets:
  before_script:
    - |
      _SS_ENV="${VAKT_ENV:-prod}"
      echo "Fetching SecHealth secrets for project=${VAKT_PROJECT} env=${_SS_ENV}"

      # Resolve environment ID
      _SS_ENV_ID=$(curl -sfH "Authorization: Bearer ${VAKT_TOKEN}" \
        "${VAKT_URL}/api/v1/secretops/projects/${VAKT_PROJECT}/envs" \
        | python3 -c "import sys,json; envs=json.load(sys.stdin); \
          match=[e for e in envs if e['name']=='${_SS_ENV}']; \
          print(match[0]['id'] if match else '')")

      if [ -z "${_SS_ENV_ID}" ]; then
        echo "ERROR: environment '${_SS_ENV}' not found" >&2
        exit 1
      fi

      # Export every secret as a shell variable
      eval $(curl -sfH "Authorization: Bearer ${VAKT_TOKEN}" \
        "${VAKT_URL}/api/v1/secretops/projects/${VAKT_PROJECT}/envs/${_SS_ENV_ID}/export")

      unset _SS_ENV _SS_ENV_ID
