server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # index.html und Service Worker nie cachen — Browser/SW muss immer die
    # aktuelle Version prüfen, damit Vite-Bundle-Updates sofort ankommen.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Vite-Assets haben Content-Hash im Dateinamen → langfristig cachen
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA-Fallback für alle anderen Pfade
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
