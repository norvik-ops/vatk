server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # NOTE on security headers: nginx does NOT inherit server-block `add_header`
    # into a location that declares its own `add_header`. So instead of putting
    # the security headers here at the server level, we include
    # security-headers.inc in every location below. See that file's header
    # comment for the full reasoning.

    # index.html und Service Worker nie cachen — Browser/SW muss immer die
    # aktuelle Version prüfen, damit Vite-Bundle-Updates sofort ankommen.
    location = /index.html {
        include /etc/nginx/security-headers.inc;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    location = /registerSW.js {
        include /etc/nginx/security-headers.inc;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /sw.js {
        include /etc/nginx/security-headers.inc;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Vite-Assets haben Content-Hash im Dateinamen → langfristig cachen
    location /assets/ {
        include /etc/nginx/security-headers.inc;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA-Fallback für alle anderen Pfade
    location / {
        include /etc/nginx/security-headers.inc;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        include /etc/nginx/security-headers.inc;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
